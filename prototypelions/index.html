<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Immortal's Way — Lion Puzzle Prototype</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0b0f1c;
  color: #c4b89a;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  touch-action: manipulation;
  min-height: 100vh;
  padding: 10px 0;
}
#title {
  color: #c13628;
  font-size: 11px;
  letter-spacing: 6px;
  text-align: center;
  margin-top: 8px;
}
#subtitle {
  color: #2e3a50;
  font-size: 10px;
  text-align: center;
  letter-spacing: 2px;
  margin: 4px 0 8px 0;
  line-height: 1.5;
}
#game-container {
  position: relative;
  display: inline-block;
}
canvas { display: block; }
#overlay {
  display: none;
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(10,13,22,0.93);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
#overlay-title {
  color: #4aad8a;
  font-size: 28px;
  letter-spacing: 6px;
  font-family: 'Courier New', monospace;
}
#overlay-sub {
  color: #556070;
  font-size: 11px;
  letter-spacing: 3px;
  margin: 12px 0 20px 0;
  font-family: 'Courier New', monospace;
}
#retry-btn {
  background: transparent;
  border: 1px solid #c13628;
  color: #c13628;
  font-size: 11px;
  letter-spacing: 4px;
  font-family: 'Courier New', monospace;
  padding: 8px 24px;
  border-radius: 2px;
  cursor: pointer;
}
#retry-btn:hover { background: rgba(193,54,40,0.15); }
#legend {
  font-size: 10px;
  color: #2e3a50;
  text-align: center;
  margin: 8px 0;
  letter-spacing: 1px;
}
#dpad {
  display: grid;
  grid-template-columns: 52px 52px 52px;
  grid-template-rows: 52px 52px 52px;
  gap: 5px;
  margin-top: 4px;
}
.dpad-btn {
  width: 52px; height: 52px;
  background: #1c2236;
  border: 1px solid #2e3a5a;
  color: #c4b89a;
  font-size: 20px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
.dpad-btn:active, .dpad-btn.active {
  background: #c13628;
}
.dpad-empty {
  width: 52px; height: 52px;
}
</style>
</head>
<body>
<div id="game-container">
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <div id="overlay-title">✦ 通過 ✦</div>
    <div id="overlay-sub">YOU REACHED THE DOOR</div>
    <button id="retry-btn">TRY AGAIN</button>
  </div>
</div>
<div id="legend">🐰 YOU · 🦁 GUARDIAN · 🚪 DOOR · 🌿 BUSH · 🌳 TREE · ── FENCE</div>
<div style="color:#2e3a50;font-size:9px;letter-spacing:2px;text-align:center;margin-top:4px;font-family:'Courier New',monospace;">v1.2</div>
<div id="dpad">
  <div class="dpad-empty"></div>
  <div class="dpad-btn" data-dx="0" data-dy="-1">↑</div>
  <div class="dpad-empty"></div>
  <div class="dpad-btn" data-dx="-1" data-dy="0">←</div>
  <div class="dpad-empty"></div>
  <div class="dpad-btn" data-dx="1" data-dy="0">→</div>
  <div class="dpad-empty"></div>
  <div class="dpad-btn" data-dx="0" data-dy="1">↓</div>
  <div class="dpad-empty"></div>
</div>

<script>
const GRID_W = 18;
const GRID_H = 14;
const DOOR_X = 7;
const DOOR_W = 4;
const FENCE_ROW = 3;
const FENCE_GAP_START = 6;
const FENCE_GAP_END = 10;
const LION_STEP_MS = 350;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('game-container');
const overlay = document.getElementById('overlay');

let CELL = 32;
let bunny, lions, status, lionTimer, bushes, trees, fence;

// Lion starting positions — behind the fence, inside the pen
const LION_A_ORIGIN = { x: 7, y: 4 };
const LION_B_ORIGIN = { x: 10, y: 4 };

// Bushes — top corners matching sketch
const BUSH_LAYOUT = [
  // Row 1 — BB at edges
  {x:0,y:1},{x:1,y:1},
  {x:16,y:1},{x:17,y:1},
  // Row 2 — BBBB slightly indented
  {x:1,y:2},{x:2,y:2},{x:3,y:2},{x:4,y:2},
  {x:13,y:2},{x:14,y:2},{x:15,y:2},{x:16,y:2},
];

// Trees — solid obstacles matching sketch
const TREE_LAYOUT = [
  // Row 4 — TTTTT flanking pen (TTTTTF...FTTTTTTT)
  {x:0,y:4},{x:1,y:4},{x:2,y:4},{x:3,y:4},{x:4,y:4},
  {x:13,y:4},{x:14,y:4},{x:15,y:4},{x:16,y:4},{x:17,y:4},
  // Row 5 — TTT...TTTT pen boundary
  {x:1,y:5},{x:2,y:5},{x:3,y:5},
  {x:15,y:5},{x:16,y:5},{x:17,y:5},
  // Row 6 — T...TTT
  {x:0,y:6},
  {x:14,y:6},{x:15,y:6},{x:16,y:6},
  // Row 7 — TTT...TTTT
  {x:0,y:7},{x:1,y:7},{x:2,y:7},
  {x:14,y:7},{x:15,y:7},{x:16,y:7},{x:17,y:7},
  // Row 8 — TTT...TT TT
  {x:0,y:8},{x:1,y:8},{x:2,y:8},
  {x:13,y:8},{x:14,y:8},{x:16,y:8},{x:17,y:8},
];

// Pen fence cells — side walls + bottom walls
const PEN_FENCE = [
  // Row 4 side walls (F in TTTTTF and F in FTTTTTTT)
  {x:5,y:4},{x:12,y:4},
  // Row 5 pen bottom walls (FFFFFF sections, leaving space for 2x2 lions)
  {x:4,y:5},{x:5,y:5},
  {x:12,y:5},{x:13,y:5},{x:14,y:5},
];

function buildFence() {
  const cells = new Set();
  // Main horizontal fence (row 3): FFFFFF gap FFFFFFF
  for (let x = 0; x < GRID_W; x++) {
    if (x < FENCE_GAP_START || x > FENCE_GAP_END) {
      cells.add(x + ',' + FENCE_ROW);
    }
  }
  // Pen fence cells
  for (const p of PEN_FENCE) {
    cells.add(p.x + ',' + p.y);
  }
  return cells;
}

function getCellSize() {
  const cw = Math.floor((Math.min(window.innerWidth - 32, 700)) / GRID_W);
  const ch = Math.floor((window.innerHeight * 0.50) / GRID_H);
  return Math.min(cw, ch);
}

function resizeCanvas() {
  CELL = getCellSize();
  if (CELL < 10) CELL = 10;
  canvas.width = GRID_W * CELL;
  canvas.height = GRID_H * CELL;
  container.style.width = canvas.width + 'px';
  container.style.height = canvas.height + 'px';
  draw();
}

function initState() {
  bunny = { x: 9, y: 11 };
  lions = [
    { x: LION_A_ORIGIN.x, y: LION_A_ORIGIN.y },
    { x: LION_B_ORIGIN.x, y: LION_B_ORIGIN.y }
  ];
  status = 'playing';
  overlay.style.display = 'none';
  bushes = new Set(BUSH_LAYOUT.map(b => b.x + ',' + b.y));
  trees = new Set(TREE_LAYOUT.map(t => t.x + ',' + t.y));
  fence = buildFence();
  if (lionTimer) clearInterval(lionTimer);
  lionTimer = setInterval(tickLions, LION_STEP_MS);
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function hasTree(x, y) { return trees.has(x + ',' + y); }
function hasBush(x, y) { return bushes.has(x + ',' + y); }
function hasFence(x, y) { return fence.has(x + ',' + y); }

// Blocked for bunny: trees, fence, bushes
function bunnyBlocked(x, y) {
  return hasTree(x, y) || hasFence(x, y) || hasBush(x, y);
}

// Blocked for lion 2x2 body
function lionBlockedAt(lx, ly) {
  for (let dx = 0; dx <= 1; dx++) {
    for (let dy = 0; dy <= 1; dy++) {
      const cx = lx + dx, cy = ly + dy;
      if (cx < 0 || cx >= GRID_W || cy < 0 || cy >= GRID_H) return true;
      if (hasTree(cx, cy) || hasFence(cx, cy)) return true;
    }
  }
  return false;
}

// Check if bunny overlaps a 2x2 lion body
function bunnyOnLion(bx, by) {
  for (const lion of lions) {
    if (bx >= lion.x && bx <= lion.x + 1 && by >= lion.y && by <= lion.y + 1) {
      return lion;
    }
  }
  return null;
}

// Check if two 2x2 lions overlap
function lionsWouldOverlap(ax, ay, bx, by) {
  return ax < bx + 2 && ax + 2 > bx && ay < by + 2 && ay + 2 > by;
}

// Manhattan distance from bunny to nearest cell of a 2x2 lion
function distToLion(lion) {
  const cx = clamp(bunny.x, lion.x, lion.x + 1);
  const cy = clamp(bunny.y, lion.y, lion.y + 1);
  return Math.abs(bunny.x - cx) + Math.abs(bunny.y - cy);
}

// Push bunny downward — 3 cells
function pushBunnyFrom() {
  bunny.y = clamp(bunny.y + 3, 0, GRID_H - 1);
}

// Check if bunny is in push zone (1-cell margin around lion body)
function inPushZone(lion, bx, by) {
  return bx >= lion.x - 1 && bx <= lion.x + 2 && by >= lion.y - 1 && by <= lion.y + 2;
}

// Lions crush bushes they overlap
function lionsCrushBushes() {
  for (const lion of lions) {
    for (let dx = 0; dx <= 1; dx++) {
      for (let dy = 0; dy <= 1; dy++) {
        bushes.delete((lion.x + dx) + ',' + (lion.y + dy));
      }
    }
  }
}

function tickLions() {
  if (status !== 'playing') return;

  const lionA = lions[0];
  const lionB = lions[1];

  // Mirror at half distance: target is halfway between origin and bunny x
  const targetAx = clamp(Math.round(LION_A_ORIGIN.x + (bunny.x - LION_A_ORIGIN.x) / 2), 0, GRID_W - 2);

  // Move lion A one step toward target
  let newAx = lionA.x;
  if (lionA.x < targetAx) newAx++;
  else if (lionA.x > targetAx) newAx--;
  newAx = clamp(newAx, 0, GRID_W - 2);

  if (!lionsWouldOverlap(newAx, lionA.y, lionB.x, lionB.y) && !lionBlockedAt(newAx, lionA.y)) {
    lionA.x = newAx;
  }

  // Lion B mirrors lion A across center axis
  const mirrorBx = clamp((GRID_W - 2) - lionA.x, 0, GRID_W - 2);
  let newBx = lionB.x;
  if (lionB.x < mirrorBx) newBx++;
  else if (lionB.x > mirrorBx) newBx--;
  newBx = clamp(newBx, 0, GRID_W - 2);

  if (!lionsWouldOverlap(lionA.x, lionA.y, newBx, lionB.y) && !lionBlockedAt(newBx, lionB.y)) {
    lionB.x = newBx;
  }

  // Lions NEVER cross the fence — no vertical movement, stay behind fence always
  lionB.y = lionA.y;

  lionsCrushBushes();

  // Push bunny if overlapping lion body
  let pushed = true;
  let safety = 5;
  while (pushed && safety-- > 0) {
    pushed = false;
    if (bunnyOnLion(bunny.x, bunny.y)) {
      pushBunnyFrom();
      pushed = true;
    }
  }

  checkWin();
  draw();
}

function checkWin() {
  if (bunny.y === 0 && bunny.x >= DOOR_X && bunny.x <= DOOR_X + DOOR_W - 1) {
    status = 'won';
    if (lionTimer) clearInterval(lionTimer);
    showOverlay();
  }
}

function move(dx, dy) {
  if (status !== 'playing') return;

  let nx = clamp(bunny.x + dx, 0, GRID_W - 1);
  let ny = clamp(bunny.y + dy, 0, GRID_H - 1);

  // Blocked by trees, fence, bushes
  if (bunnyBlocked(nx, ny)) {
    nx = bunny.x;
    ny = bunny.y;
  }

  // Blocked by lion body
  if (bunnyOnLion(nx, ny)) {
    nx = bunny.x;
    ny = bunny.y;
  }

  bunny.x = nx;
  bunny.y = ny;

  // Push bunny if in push zone after moving
  for (const lion of lions) {
    if (inPushZone(lion, bunny.x, bunny.y)) {
      pushBunnyFrom();
    }
  }

  checkWin();
  draw();
}

function showOverlay() {
  overlay.style.display = 'flex';
  if (lionTimer) clearInterval(lionTimer);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function draw() {
  const W = canvas.width;
  const H = canvas.height;

  // Background
  ctx.fillStyle = '#101422';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#1e2540';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, W, H);

  // Dot grid
  ctx.fillStyle = '#1e2540';
  for (let r = 0; r < GRID_H; r++) {
    for (let c = 0; c < GRID_W; c++) {
      ctx.beginPath();
      ctx.arc(c * CELL + CELL / 2, r * CELL + CELL / 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Door
  const doorGrad = ctx.createLinearGradient(DOOR_X * CELL, 0, (DOOR_X + DOOR_W) * CELL, CELL);
  doorGrad.addColorStop(0, '#2e6b5a');
  doorGrad.addColorStop(1, '#4aad8a');
  ctx.fillStyle = doorGrad;
  ctx.fillRect(DOOR_X * CELL, 0, DOOR_W * CELL, CELL);
  ctx.strokeStyle = '#4aad8a';
  ctx.lineWidth = 1;
  ctx.strokeRect(DOOR_X * CELL, 0, DOOR_W * CELL, CELL);
  ctx.fillStyle = '#0b0f1c';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = Math.max(10, CELL * 0.45) + 'px "Courier New", monospace';
  ctx.fillText('🚪 door', (DOOR_X + DOOR_W / 2) * CELL, CELL / 2);

  // Flanking walls
  ctx.fillStyle = '#0d1020';
  ctx.fillRect(0, 0, DOOR_X * CELL, CELL);
  ctx.fillRect((DOOR_X + DOOR_W) * CELL, 0, (GRID_W - DOOR_X - DOOR_W) * CELL, CELL);

  // Fence — draw all fence cells
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 3;
  ctx.setLineDash([]);
  // Main horizontal fence line
  const fenceY = FENCE_ROW * CELL + CELL / 2;
  if (FENCE_GAP_START > 0) {
    ctx.beginPath();
    ctx.moveTo(0, fenceY);
    ctx.lineTo(FENCE_GAP_START * CELL, fenceY);
    ctx.stroke();
  }
  if (FENCE_GAP_END < GRID_W - 1) {
    ctx.beginPath();
    ctx.moveTo((FENCE_GAP_END + 1) * CELL, fenceY);
    ctx.lineTo(GRID_W * CELL, fenceY);
    ctx.stroke();
  }
  // Fence posts on main row
  ctx.fillStyle = '#8B6914';
  for (let x = 0; x < GRID_W; x++) {
    if (x < FENCE_GAP_START || x > FENCE_GAP_END) {
      const px = x * CELL + CELL / 2;
      ctx.fillRect(px - 2, fenceY - CELL * 0.3, 4, CELL * 0.6);
    }
  }
  // Pen fence cells (side walls + bottom walls)
  for (const p of PEN_FENCE) {
    const px = p.x * CELL;
    const py = p.y * CELL;
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(px + 2, py + 2, CELL - 4, CELL - 4);
    ctx.strokeStyle = '#a07a1a';
    ctx.lineWidth = 1;
    ctx.strokeRect(px + 2, py + 2, CELL - 4, CELL - 4);
    // Fence post
    ctx.fillStyle = '#6a5010';
    ctx.fillRect(px + CELL / 2 - 2, py + CELL * 0.2, 4, CELL * 0.6);
  }
  // Gap indicator
  ctx.fillStyle = 'rgba(74, 173, 138, 0.15)';
  ctx.fillRect(FENCE_GAP_START * CELL, FENCE_ROW * CELL, (FENCE_GAP_END - FENCE_GAP_START + 1) * CELL, CELL);

  // Bushes
  for (const key of bushes) {
    const [bx, by] = key.split(',').map(Number);
    const px = bx * CELL;
    const py = by * CELL;
    ctx.fillStyle = '#1a3a28';
    ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
    ctx.strokeStyle = '#2e6b4a';
    ctx.lineWidth = 1;
    ctx.strokeRect(px + 1, py + 1, CELL - 2, CELL - 2);
    ctx.font = Math.max(10, CELL * 0.55) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🌿', px + CELL / 2, py + CELL / 2);
  }

  // Trees
  for (const key of trees) {
    const [tx, ty] = key.split(',').map(Number);
    const px = tx * CELL;
    const py = ty * CELL;
    // Tree trunk
    ctx.fillStyle = '#3d2b1a';
    const trunkW = CELL * 0.2;
    ctx.fillRect(px + CELL / 2 - trunkW / 2, py + CELL * 0.5, trunkW, CELL * 0.5);
    // Tree canopy
    ctx.fillStyle = '#1a4a20';
    ctx.beginPath();
    ctx.arc(px + CELL / 2, py + CELL * 0.4, CELL * 0.38, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2e7a3a';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Emoji
    ctx.font = Math.max(10, CELL * 0.5) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🌳', px + CELL / 2, py + CELL / 2);
  }

  // Mirror axes
  // Vertical axis (horizontal mirror)
  const axisX = GRID_W * CELL / 2;
  ctx.strokeStyle = 'rgba(120,160,220,0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(axisX, CELL);
  ctx.lineTo(axisX, H);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(120,160,220,0.3)';
  ctx.font = '8px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('MIRROR', axisX, H - 4);

  // Horizontal axis (vertical mirror) — visual only
  const axisY = (LION_A_ORIGIN.y + 1) * CELL;
  ctx.strokeStyle = 'rgba(220,160,120,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(0, axisY);
  ctx.lineTo(W, axisY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Lions always track — always active
  const following = true;

  // Push zones (dashed) — only when following
  if (following) {
    for (const lion of lions) {
      const zx = (lion.x - 1) * CELL;
      const zy = (lion.y - 1) * CELL;
      const zw = 4 * CELL;
      const zh = 4 * CELL;
      ctx.strokeStyle = 'rgba(193,54,40,0.25)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.strokeRect(zx, zy, zw, zh);
      ctx.setLineDash([]);
    }
  }

  // Lions
  for (let i = 0; i < lions.length; i++) {
    const lion = lions[i];
    const lx = lion.x * CELL;
    const ly = lion.y * CELL;
    const lw = 2 * CELL;
    const lh = 2 * CELL;

    // Body
    const lionGrad = ctx.createLinearGradient(lx, ly, lx, ly + lh);
    if (following) {
      lionGrad.addColorStop(0, '#7a6548');
      lionGrad.addColorStop(0.5, '#5c4a30');
      lionGrad.addColorStop(1, '#3e3020');
    } else {
      // Dimmer when disengaged
      lionGrad.addColorStop(0, '#4a4538');
      lionGrad.addColorStop(0.5, '#3c3a30');
      lionGrad.addColorStop(1, '#2e2820');
    }
    roundRect(ctx, lx + 2, ly + 2, lw - 4, lh - 4, 6);
    ctx.fillStyle = lionGrad;
    ctx.fill();
    ctx.strokeStyle = following ? '#a08060' : '#605840';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Lion emoji
    ctx.font = Math.max(12, CELL * 0.7) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🦁', lx + lw / 2, ly + lh / 2 - CELL * 0.15);

    // Label
    ctx.font = Math.max(8, CELL * 0.3) + 'px "Courier New", monospace';
    ctx.fillStyle = following ? '#a08060' : '#605840';
    ctx.fillText('石獅', lx + lw / 2, ly + lh / 2 + CELL * 0.4);

    // Status indicator
    if (!following) {
      ctx.font = Math.max(7, CELL * 0.25) + 'px "Courier New", monospace';
      ctx.fillStyle = '#556070';
      ctx.fillText('zzz', lx + lw / 2, ly - 4);
    }
  }

  // Bunny
  const bx = bunny.x * CELL + CELL / 2;
  const by = bunny.y * CELL + CELL / 2;
  const br = CELL * 0.4;
  const bunnyGrad = ctx.createRadialGradient(bx, by, 0, bx, by, br);
  bunnyGrad.addColorStop(0, '#f5ede0');
  bunnyGrad.addColorStop(1, '#d4b896');
  ctx.beginPath();
  ctx.arc(bx, by, br, 0, Math.PI * 2);
  ctx.fillStyle = bunnyGrad;
  ctx.fill();
  ctx.strokeStyle = '#f0e4d0';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.font = Math.max(10, CELL * 0.55) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🐰', bx, by);
}

// Keyboard controls
document.addEventListener('keydown', function(e) {
  const keyMap = {
    'ArrowLeft':  [-1,  0],
    'ArrowRight': [ 1,  0],
    'ArrowUp':    [ 0, -1],
    'ArrowDown':  [ 0,  1]
  };
  if (keyMap[e.key]) {
    e.preventDefault();
    move(keyMap[e.key][0], keyMap[e.key][1]);
  }
});

// D-pad controls
document.querySelectorAll('.dpad-btn').forEach(function(btn) {
  btn.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    btn.classList.add('active');
    move(parseInt(btn.dataset.dx), parseInt(btn.dataset.dy));
  });
  btn.addEventListener('pointerup', function() { btn.classList.remove('active'); });
  btn.addEventListener('pointerleave', function() { btn.classList.remove('active'); });
});

// Retry button
document.getElementById('retry-btn').addEventListener('click', function() {
  initState();
  draw();
});

window.addEventListener('resize', resizeCanvas);

// Boot
initState();
resizeCanvas();
draw();
</script>
</body>
</html>
