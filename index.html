        <style>
            #masthead.site-header.standard { background-color: transparent !important; box-shadow: none !important; }
            #masthead.site-header.standard.stuck { background-color: transparent !important; box-shadow: none !important; }

            /* Hero banner */
            .hero-banner {
                position: relative;
                width: 100%;
                max-height: 800px;
                min-height: 500px;
                height: 75vh;
                overflow: hidden;
                margin-top: 0;
            }
            /* Hero breathing animations - each on its own timing */
            @keyframes breatheFire {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.03) translateY(-6px); }
            }
            @keyframes breatheTaotie {
                0%, 100% { transform: rotate(15deg) scale(1); }
                50% { transform: rotate(15deg) scale(1.04) translate(-4px, 4px); }
            }
            @keyframes breatheRabbit {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.035) translate(3px, -6px); }
            }
            @keyframes breatheLogo {
                0%, 100% { transform: translate(-50%, -50%) scale(1); }
                50% { transform: translate(-50%, -50%) scale(1.02); }
            }
            .hero-fire {
                animation: breatheFire 6s ease-in-out infinite;
            }
            .hero-taotie {
                animation: breatheTaotie 7s ease-in-out infinite;
                animation-delay: -2s;
            }
            .hero-rabbit {
                animation: breatheRabbit 5s ease-in-out infinite;
                animation-delay: -3.5s;
            }
            .hero-logo {
                animation: breatheLogo 8s ease-in-out infinite;
                animation-delay: -1s;
            }

            /* Large screen hero adjustments - when max-height kicks in */
            @media (min-width: 1200px) {
                .hero-fire {
                    width: auto !important;
                    height: 140% !important;
                    margin-top: -35% !important;
                    margin-left: -35% !important;
                }
                .hero-taotie {
                    width: auto !important;
                    height: 80% !important;
                }
                .hero-rabbit {
                    width: auto !important;
                    height: 110% !important;
                }
                .hero-logo {
                    width: auto !important;
                    height: 35% !important;
                    max-width: none !important;
                }
            }

            /* Mobile responsive hero adjustments */
            @media (max-width: 768px) {
                .hero-banner {
                    min-height: 400px;
                    height: 70vh;
                }
                .hero-fire {
                    width: 180% !important;
                    margin-left: -90% !important;
                    margin-top: -45% !important;
                }
                .hero-taotie {
                    width: 65% !important;
                    top: -8% !important;
                    right: -15% !important;
                }
                .hero-rabbit {
                    width: 100% !important;
                    bottom: -15% !important;
                    left: -10% !important;
                }
                .hero-logo {
                    width: 65% !important;
                }
                .hero-banner .hero-text {
                    padding: 20px 15px 20px !important;
                }
                .hero-banner .hero-text p {
                    font-size: 15px !important;
                }
                .hero-banner .hero-text a {
                    padding: 12px 28px !important;
                    font-size: 14px !important;
                }
            }
            @media (max-width: 480px) {
                .hero-banner {
                    min-height: 350px;
                    height: 65vh;
                }
                .hero-fire {
                    width: 220% !important;
                    margin-left: -110% !important;
                    margin-top: -55% !important;
                }
                .hero-taotie {
                    width: 70% !important;
                    top: -5% !important;
                    right: -18% !important;
                }
                .hero-rabbit {
                    width: 110% !important;
                    bottom: -10% !important;
                    left: -15% !important;
                }
                .hero-logo {
                    width: 75% !important;
                }
            }
        </style>
